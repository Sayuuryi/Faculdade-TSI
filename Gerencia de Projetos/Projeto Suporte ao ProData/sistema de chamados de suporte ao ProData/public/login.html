<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Suporte ao ProData</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-slate-800 h-screen flex items-center justify-center">

<div class="bg-white/10 backdrop-blur-xl p-10 rounded-2xl shadow-2xl w-96 text-white">

<h2 class="text-3xl font-bold mb-6 text-center">Suporte ao ProData</h2>

<input id="email" placeholder="Email"
class="w-full mb-3 p-3 rounded bg-white/80 text-black">

<input id="senha" type="password" placeholder="Senha"
class="w-full mb-4 p-3 rounded bg-white/80 text-black">

<button onclick="login()"
class="w-full bg-blue-500 hover:bg-blue-600 transition p-3 rounded font-semibold">
Entrar
</button>

<div class="flex items-center my-4">
<div class="flex-1 h-px bg-gray-400"></div>
<span class="px-2 text-sm">ou</span>
<div class="flex-1 h-px bg-gray-400"></div>
</div>

<div class="flex gap-3">

<button class="flex-1 bg-white text-black p-2 rounded flex items-center justify-center gap-2">
🔵 Google
</button>

<button class="flex-1 bg-black text-white p-2 rounded flex items-center justify-center gap-2">
🐙 GitHub
</button>

<script src="app.js"></script>
</body>
</html>
