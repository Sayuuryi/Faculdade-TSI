<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Novo Chamado</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
.fade { animation: fade 0.3s ease; }
@keyframes fade { from{opacity:0} to{opacity:1} }
</style>

</head>

<body class="bg-gray-100">

<div class="flex h-screen">

<div class="w-64 bg-slate-900 text-slate-300 flex flex-col p-6">

<div class="flex items-center gap-2 mb-10">
<div class="bg-blue-600 p-2 rounded-lg">💻</div>
<h2 class="text-lg font-semibold text-white">Suporte ProData</h2>
</div>

<nav class="flex-1 space-y-2">

<a href="dashboard.html"
class="flex items-center gap-3 px-3 py-2 rounded-lg bg-blue-600 text-white">
📊 Dashboard
</a>

<a href="abrir.html"
class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-800 transition">
➕ Novo Chamado
</a>

<a href="admin.html"
class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-800 transition">
🛠 Admin
</a>

<a href="resolvidos.html"
class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-800 transition">
✔ Resolvidos
</a>

</nav>

<button onclick="logout()"
class="mt-6 bg-red-500 hover:bg-red-600 text-white p-2 rounded-lg">
Sair
</button>

</div>

<div class="flex-1 flex items-center justify-center">

<div class="bg-white p-8 rounded-xl shadow w-[500px] fade">

<h2 class="text-2xl font-bold mb-6">Novo Chamado</h2>

<input id="titulo" placeholder="Título"
class="w-full mb-3 p-3 border rounded">

<textarea id="descricao" placeholder="Descrição"
class="w-full mb-3 p-3 border rounded"></textarea>

<select id="prioridade" class="w-full mb-4 p-3 border rounded">
<option>Baixa</option>
<option>Média</option>
<option>Alta</option>
</select>

<button id="btn"
onclick="criarChamado()"
class="w-full bg-blue-500 text-white p-3 rounded">
Criar Chamado
</button>

</div>

</div>

</div>

<!-- TOAST -->
<div id="toast" class="fixed bottom-5 right-5 hidden bg-green-500 text-white px-5 py-3 rounded">
Sucesso!
</div>

<script src="app.js"></script>

<script>
function toast(msg){
 const t = document.getElementById("toast");
 t.innerText = msg;
 t.classList.remove("hidden");
 setTimeout(()=>t.classList.add("hidden"),3000);
}

async function criarChamado(){

 btn.innerText = "Criando...";
 btn.disabled = true;

 await fetch("/chamados", {
  method:"POST",
  headers: {"Content-Type":"application/json"},
  body: JSON.stringify({
   titulo:titulo.value,
   prioridade:prioridade.value
  })
 });

 toast("Chamado criado!");
 setTimeout(()=>location="dashboard.html",1200);
}
</script>

</body>
</html>
